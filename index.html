<!DOCTYPE html>
<html>
<head>
    <title>GENESISTUDIO | Persistent Canvas</title>
    <style>
        :root { --accent: #ffffff; --bg: #000; --dim: #222; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; cursor: grab; }
        #canvas { position: absolute; width: 5000px; height: 5000px; top: 0; left: 0; transform-origin: 0 0; }
        
        #settings-btn { position: fixed; top: 20px; right: 20px; cursor: pointer; z-index: 2000; opacity: 0.3; }
        #settings-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; }
        
        #main-node {
            position: absolute; top: 400px; left: 600px; width: 400px;
            border: 1px solid var(--dim); background: rgba(5,5,5,0.98); padding: 30px;
            cursor: move; z-index: 100; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        #ui { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: 70%; max-width: 600px; text-align: center; }
        #input { background: none; border: none; border-bottom: 1px solid var(--dim); color: #fff; width: 100%; text-align: center; padding: 15px; outline: none; font-size: 18px; }
    </style>
</head>
<body>

<div id="settings-btn" onclick="toggleSettings()">⚙ CONFIG</div>
<div id="settings-panel" id="panel">
    <h2>NEURAL CONFIG</h2>
    <input type="text" id="api-input" placeholder="API KEY" style="padding:10px; width:300px;"><br><br>
    <button onclick="saveKey()">SAVE & RECONNECT</button>
</div>

<div id="viewport">
    <div id="canvas">
        <div id="main-node">
            <div style="font-size: 9px; color: #555; margin-bottom: 10px; letter-spacing: 2px;">PROJECT: SEED</div>
            <div id="display" style="font-size: 15px; color: #ccc; line-height: 1.6; white-space: pre-wrap;">Restoring last session...</div>
        </div>
    </div>
</div>

<div id="ui">
    <input type="text" id="input" placeholder="TALK TO THE BRAIN..." autocomplete="off">
</div>

<script>
    // --- PERSISTENCE ENGINE ---
    let API_KEY = localStorage.getItem('GENESIS_KEY') || "";
    let savedContent = localStorage.getItem('GENESIS_CONTENT') || "The canvas is empty. Start your journey.";
    
    const display = document.getElementById('display');
    const input = document.getElementById('input');
    const canvas = document.getElementById('canvas');
    const node = document.getElementById('main-node');

    // Initial Load
    display.innerText = savedContent;

    function toggleSettings() {
        const p = document.getElementById('settings-panel');
        p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
    }

    function saveKey() {
        localStorage.setItem('GENESIS_KEY', document.getElementById('api-input').value.trim());
        location.reload();
    }

    // --- PAN & ZOOM ---
    let zoom = 1, panX = 0, panY = 0;
    window.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoomSpeed = 0.001;
        zoom -= e.deltaY * zoomSpeed;
        zoom = Math.min(Math.max(0.2, zoom), 3);
        canvas.style.transform = `scale(${zoom})`;
    }, { passive: false });

    // --- DRAG ---
    let isDragging = false, startX, startY;
    node.onmousedown = (e) => { isDragging = true; startX = e.clientX - node.offsetLeft; startY = e.clientY - node.offsetTop; };
    window.onmousemove = (e) => { if(isDragging) { node.style.left = (e.clientX - startX) + 'px'; node.style.top = (e.clientY - startY) + 'px'; } };
    window.onmouseup = () => isDragging = false;

    // --- BRAIN INTERACTION ---
    input.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            e.preventDefault(); // STOP THE AUTO-REFRESH
            const val = input.value;
            input.value = '';
            display.innerText = "Processing...";

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });
                const data = await res.json();
                const responseText = data.candidates[0].content.parts[0].text;
                
                // SAVE TO LOCAL STORAGE
                display.innerText = responseText;
                localStorage.setItem('GENESIS_CONTENT', responseText);
                
            } catch (err) {
                display.innerText = "Error: " + err.message;
            }
        }
    });
</script>
</body>
</html>
