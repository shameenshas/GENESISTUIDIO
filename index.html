<script>
    // Force a clean key retrieval
    let API_KEY = localStorage.getItem('GENESIS_KEY');
    if (!API_KEY || API_KEY === "null") {
        API_KEY = prompt("NEURAL LINK REQUIRED. PLEASE PASTE YOUR API KEY:");
        if (API_KEY) localStorage.setItem('GENESIS_KEY', API_KEY.trim());
    }

    const canvas = document.getElementById('canvas');
    const node = document.getElementById('project-node');
    const input = document.getElementById('main-input');
    const status = document.getElementById('status');
    const portal = document.getElementById('brain-portal');
    const contentDiv = document.getElementById('content');
    
    let zoom = 1;

    // ZOOM & DRAG (Keep existing logic)
    window.addEventListener('wheel', (e) => {
        zoom -= e.deltaY * 0.001;
        zoom = Math.min(Math.max(0.2, zoom), 2);
        canvas.style.transform = `scale(${zoom})`;
        document.body.classList.toggle('zoomed-out', zoom < 0.6);
    });

    let dragging = false, offset = {x:0, y:0};
    node.onmousedown = (e) => { dragging = true; offset = {x: e.clientX - node.offsetLeft, y: e.clientY - node.offsetTop}; };
    window.onmousemove = (e) => { if(dragging) { node.style.left = (e.clientX - offset.x) + 'px'; node.style.top = (e.clientY - offset.y) + 'px'; }};
    window.onmouseup = () => { dragging = false; };

    // REPAIRED BRAIN LOGIC
    input.onkeypress = async (e) => {
        if (e.key === 'Enter' && input.value) {
            const query = input.value;
            input.value = '';
            status.innerText = "ATTEMPTING NEURAL SYNC...";
            portal.classList.add('thinking');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: query }] }] })
                });

                if (!response.ok) throw new Error(`Server Response: ${response.status}`);

                const data = await response.json();
                const brainText = data.candidates[0].content.parts[0].text;
                
                contentDiv.innerText = brainText;
                status.innerText = "NEURAL LINK: ESTABLISHED";
            } catch (err) {
                status.innerText = "CRITICAL ERROR";
                contentDiv.innerHTML = `<span style="color:red">CONNECTION FAILED:</span><br>${err.message}<br><br>Check if your API Key is correct or if you are offline.`;
            } finally {
                portal.classList.remove('thinking');
            }
        }
    };
</script>
