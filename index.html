<!DOCTYPE html>
<html>
<head>
    <title>GENESISTUDIO | Production Link</title>
    <style>
        :root { --accent: #ffffff; --bg: #000; --dim: #222; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: monospace; overflow: hidden; }
        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        #canvas { position: absolute; width: 5000px; height: 5000px; top: 0; left: 0; transform-origin: 0 0; transition: transform 0.1s ease-out; }
        
        /* Minimalist Portal Outline */
        #portal {
            position: absolute; top: 500px; left: 500px; transform: translate(-50%, -50%);
            width: 70px; height: 70px; border: 1px solid var(--dim); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        #portal-inner { width: 20px; height: 20px; border: 1px solid #444; border-radius: 50%; }
        .thinking #portal-inner { border-color: #fff; box-shadow: 0 0 15px #fff; animation: pulse 1s infinite; }

        /* Project Container */
        #main-node {
            position: absolute; top: 400px; left: 650px; width: 350px;
            border: 1px solid var(--dim); background: rgba(5,5,5,0.9); padding: 25px;
            cursor: move; z-index: 100; transition: 0.3s;
        }
        .zoomed-out #main-node { width: 160px; height: 35px; padding: 5px; border-color: #555; overflow: hidden; }
        .zoomed-out .content { display: none; }
        .label { font-size: 11px; color: #fff; text-align: center; display: none; margin-top: 10px; }
        .zoomed-out .label { display: block; }

        /* UI */
        #ui { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: 80%; text-align: center; }
        #input { background: none; border: none; border-bottom: 1px solid var(--dim); color: #fff; width: 100%; text-align: center; padding: 10px; outline: none; font-size: 16px; }
        #status { font-size: 9px; color: #444; margin-top: 10px; letter-spacing: 2px; }

        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div id="viewport">
    <div id="canvas">
        <div id="portal"><div id="portal-inner"></div></div>
        <div id="main-node">
            <div class="label">PROJECT: RABBIT SEED</div>
            <div style="font-size: 9px; color: #555; margin-bottom: 10px;">PRIMARY CONTAINER</div>
            <div id="display" class="content" style="font-size: 14px; color: #ccc; line-height: 1.5;">Neural Link Standby. Enter your first command below.</div>
        </div>
    </div>
</div>

<div id="ui">
    <input type="text" id="input" placeholder="COMMAND THE BRAIN..." autocomplete="off">
    <div id="status">LINK STATUS: READY</div>
</div>

<script>
    const key = localStorage.getItem('GENESIS_KEY') || prompt("PASTE API KEY:");
    if(key) localStorage.setItem('GENESIS_KEY', key.trim());

    const canvas = document.getElementById('canvas');
    const node = document.getElementById('main-node');
    const display = document.getElementById('display');
    const status = document.getElementById('status');
    const portal = document.getElementById('portal');
    let zoom = 1;

    // Zoom Logic
    window.addEventListener('wheel', (e) => {
        zoom -= e.deltaY * 0.001;
        zoom = Math.min(Math.max(0.2, zoom), 2);
        canvas.style.transform = `scale(${zoom})`;
        document.body.classList.toggle('zoomed-out', zoom < 0.6);
    });

    // Drag Logic
    let drag = false, ox, oy;
    node.onmousedown = (e) => { drag = true; ox = e.clientX - node.offsetLeft; oy = e.clientY - node.offsetTop; };
    window.onmousemove = (e) => { if(drag) { node.style.left = (e.clientX - ox) + 'px'; node.style.top = (e.clientY - oy) + 'px'; } };
    window.onmouseup = () => drag = false;

    // Production-Ready Brain Link
    document.getElementById('input').onkeypress = async (e) => {
        if (e.key === 'Enter') {
            const val = e.target.value; e.target.value = '';
            status.innerText = "PROCESSING...";
            portal.classList.add('thinking');

            try {
                // Using the v1 (Stable) Endpoint
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });

                const data = await res.json();
                
                if (data.error) {
                    display.innerHTML = `<span style="color:red">API ERROR:</span><br>${data.error.message}`;
                    status.innerText = "LINK FAILED";
                } else {
                    display.innerText = data.candidates[0].content.parts[0].text;
                    status.innerText = "NEURAL LINK: ACTIVE";
                }
            } catch (err) {
                display.innerText = "BROWSER ERROR: " + err.message;
            } finally {
                portal.classList.remove('thinking');
            }
        }
    };
</script>
</body>
</html>
