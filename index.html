<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENESISTUDIO | Spatial Canvas</title>
    <style>
        :root { --accent: #ffffff; --dim: #222222; --bg: #000000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* The Spatial Wrapper */
        #viewport { width: 100vw; height: 100vh; cursor: grab; perspective: 1000px; }
        #canvas { 
            position: absolute; width: 5000px; height: 5000px; 
            top: -2000px; left: -2000px; transition: transform 0.1s ease-out;
            transform-origin: center;
        }

        /* The Portal: Minimalist Outline */
        #brain-portal {
            position: absolute; top: 2500px; left: 2500px; transform: translate(-50%, -50%);
            width: 80px; height: 80px; border: 1px solid var(--dim); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        #portal-inner { width: 40px; height: 40px; border: 1px solid #444; border-radius: 50%; transition: 0.5s; }
        .thinking #portal-inner { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); animation: pulse 1.5s infinite; }

        /* Project Container: Zoom-Dependent View */
        .project-container {
            position: absolute; border: 1px solid var(--dim); 
            background: rgba(5,5,5,0.8); padding: 20px;
            transition: all 0.3s; pointer-events: all;
        }
        .zoomed-out .project-container { border: 2px solid #333; background: #000; width: 150px !important; height: 50px !important; overflow: hidden; }
        .zoomed-out .node-content { display: none; }
        .zoomed-out .project-label { display: block; font-size: 12px; text-align: center; color: var(--accent); }
        .project-label { display: none; }

        .node { position: absolute; border: 1px solid #333; padding: 10px; background: #050505; min-width: 150px; font-size: 13px; }
        
        #ui { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 80%; z-index: 9999; }
        #main-input { width: 100%; background: #000; border: none; border-bottom: 1px solid var(--dim); color: #fff; padding: 10px; outline: none; text-align: center; }
        #main-input:focus { border-color: var(--accent); }

        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.5; } }
    </style>
</head>
<body>

<div id="viewport">
    <div id="canvas">
        <div id="brain-portal"><div id="portal-inner"></div></div>
        <div id="project-alpha" class="project-container" style="top:2300px; left:2300px; width:400px; height:300px;">
            <div class="project-label">PROJECT: RABBIT SEED</div>
            <div class="node-header">PRIMARY CONTAINER</div>
            <div id="project-content" class="node-content">Awaiting Brain Dissection...</div>
        </div>
    </div>
</div>

<div id="ui">
    <input type="text" id="main-input" placeholder="INITIATE PROJECT..." autocomplete="off">
</div>

<script type="module">
    let API_KEY = localStorage.getItem('GENESIS_KEY') || prompt("ENTER NEURAL LINK API KEY:");
    if(API_KEY) localStorage.setItem('GENESIS_KEY', API_KEY);

    const canvas = document.getElementById('canvas');
    const portal = document.getElementById('brain-portal');
    const input = document.getElementById('main-input');
    let zoom = 1;

    // Zoom & Pan Logic
    window.addEventListener('wheel', (e) => {
        zoom -= e.deltaY * 0.001;
        zoom = Math.min(Math.max(.1, zoom), 3);
        canvas.style.transform = `scale(${zoom})`;
        document.body.classList.toggle('zoomed-out', zoom < 0.5);
    });

    input.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && input.value) {
            const val = input.value;
            input.value = '';
            portal.classList.add('thinking');
            await processProject(val);
        }
    });

    async function processProject(text) {
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contents: [{parts: [{text: `Analyze this story: "${text}". Output ONLY JSON: {"summary": "Brief project title", "dissection": "Bullet points of elements"}`}]}]
                })
            });
            const data = await res.json();
            const json = JSON.parse(data.candidates[0].content.parts[0].text);
            
            document.querySelector('.project-label').innerText = json.summary.toUpperCase();
            document.getElementById('project-content').innerHTML = json.dissection.replace(/\n/g, '<br>');
            portal.classList.remove('thinking');
        } catch (err) {
            console.error(err);
            portal.classList.remove('thinking');
        }
    }
</script>
</body>
</html>
