<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio | The Black Canvas</title>
    <style>
        :root { --accent: #ffffff; --dim: #222222; --bg: #000000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #canvas { width: 100vw; height: 100vh; position: relative; cursor: crosshair; }
        
        /* The Brain Portal */
        #brain-portal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, transparent 70%);
            box-shadow: 0 0 30px #fff; z-index: 100;
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); } 
                           50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); } }

        /* Generic Container Node */
        .node {
            position: absolute; padding: 15px; min-width: 150px;
            border: 1px solid var(--dim); background: rgba(10, 10, 10, 0.8);
            transition: border 0.3s, box-shadow 0.3s; pointer-events: all;
        }
        .node:focus-within { border-color: var(--accent); box-shadow: 0 0 15px rgba(255, 255, 255, 0.2); }
        .node-header { font-size: 10px; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Input Area */
        #input-interface {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 600px; z-index: 1000;
        }
        #main-input {
            width: 100%; background: none; border: none; border-bottom: 1px solid var(--dim);
            color: #fff; padding: 10px; font-size: 16px; outline: none; text-align: center;
        }
        #main-input:focus { border-bottom-color: var(--accent); }
    </style>
</head>
<body>

    <div id="canvas">
        <div id="brain-portal"></div>
        <svg id="tethers" style="position:absolute; width:100%; height:100%; pointer-events:none;"></svg>
    </div>

    <div id="input-interface">
        <input type="text" id="main-input" placeholder="DROP AN IDEA INTO THE BRAIN..." autocomplete="off">
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const mainInput = document.getElementById('main-input');

        // The AI Brain "Arbiter" Logic
        mainInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const val = this.value;
                if (val) {
                    createNode(val);
                    this.value = '';
                }
            }
        });

        function createNode(content) {
            const node = document.createElement('div');
            node.className = 'node';
            node.style.left = (Math.random() * 60 + 20) + '%';
            node.style.top = (Math.random() * 60 + 20) + '%';
            
            // AI Identification Simulation
            const type = identifyType(content);
            
            node.innerHTML = `
                <div class="node-header">${type} Container</div>
                <div class="node-content">${content}</div>
            `;
            canvas.appendChild(node);
            makeDraggable(node);
        }

        function identifyType(text) {
            // Simple identification logic to start
            if (text.length > 50) return "Text";
            if (text.toLowerCase().includes("img") || text.toLowerCase().includes("look")) return "Image";
            return "Idea";
        }

        function makeDraggable(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            el.onmousedown = dragMouseDown;
            function dragMouseDown(e) { e.preventDefault(); pos3 = e.clientX; pos4 = e.clientY; document.onmouseup = closeDragElement; document.onmousemove = elementDrag; }
            function elementDrag(e) { e.preventDefault(); pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY; pos3 = e.clientX; pos4 = e.clientY; el.style.top = (el.offsetTop - pos2) + "px"; el.style.left = (el.offsetLeft - pos1) + "px"; }
            function closeDragElement() { document.onmouseup = null; document.onmousemove = null; }
        }
    </script>
</body>
</html>
