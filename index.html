<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENESISTUDIO | Stable Link</title>
    <style>
        :root { --accent: #ffffff; --dim: #222222; --bg: #000000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        
        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        #canvas { position: absolute; width: 5000px; height: 5000px; top: 0; left: 0; transform-origin: 0 0; }

        /* The Portal */
        #brain-portal {
            position: absolute; top: 400px; left: 400px; transform: translate(-50%, -50%);
            width: 60px; height: 60px; border: 1px solid var(--dim); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        #portal-inner { width: 15px; height: 15px; border: 1px solid #444; border-radius: 50%; transition: 0.3s; }
        .thinking #portal-inner { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); animation: pulse 1s infinite; }

        /* The Node */
        #project-node {
            position: absolute; top: 300px; left: 500px;
            border: 1px solid var(--dim); background: #050505;
            padding: 20px; width: 300px; cursor: grab; z-index: 100;
        }
        .zoomed-out #project-node { width: 150px; height: 30px; padding: 5px; overflow: hidden; border-color: #555; }
        .zoomed-out .node-content { display: none; }
        .project-label { font-size: 10px; color: var(--accent); text-align: center; display: none; }
        .zoomed-out .project-label { display: block; }

        /* UI */
        #ui { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 600px; text-align: center; }
        #main-input { width: 100%; background: none; border: none; border-bottom: 1px solid var(--dim); color: #fff; padding: 10px; font-size: 16px; outline: none; text-align: center; }
        #status { font-size: 9px; color: #444; margin-top: 10px; text-transform: uppercase; }

        @keyframes pulse { 0%, 100% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }
    </style>
</head>
<body>

<div id="viewport">
    <div id="canvas">
        <div id="brain-portal"><div id="portal-inner"></div></div>
        <div id="project-node">
            <div class="project-label" id="p-label">PROJECT: IDLE</div>
            <div style="font-size: 9px; color: #555; margin-bottom: 5px;">GENESIS CONTAINER</div>
            <div id="content" style="font-size: 14px; color: #ccc; line-height: 1.4;">Waiting for connection...</div>
        </div>
    </div>
</div>

<div id="ui">
    <input type="text" id="main-input" placeholder="TALK TO THE BRAIN..." autocomplete="off">
    <div id="status">LINK IDLE</div>
</div>

<script>
    const API_KEY = localStorage.getItem('GENESIS_KEY');
    const canvas = document.getElementById('canvas');
    const node = document.getElementById('project-node');
    const input = document.getElementById('main-input');
    const status = document.getElementById('status');
    const portal = document.getElementById('brain-portal');
    
    let zoom = 1;

    // ZOOM LOGIC
    window.addEventListener('wheel', (e) => {
        zoom -= e.deltaY * 0.001;
        zoom = Math.min(Math.max(0.2, zoom), 2);
        canvas.style.transform = `scale(${zoom})`;
        document.body.classList.toggle('zoomed-out', zoom < 0.6);
    });

    // DRAG LOGIC
    let dragging = false, offset = {x:0, y:0};
    node.onmousedown = (e) => { dragging = true; offset = {x: e.clientX - node.offsetLeft, y: e.clientY - node.offsetTop}; node.style.cursor = 'grabbing'; };
    window.onmousemove = (e) => { if(dragging) { node.style.left = (e.clientX - offset.x) + 'px'; node.style.top = (e.clientY - offset.y) + 'px'; }};
    window.onmouseup = () => { dragging = false; node.style.cursor = 'grab'; };

    // BRAIN LOGIC
    input.onkeypress = async (e) => {
        if (e.key === 'Enter' && input.value) {
            const query = input.value;
            input.value = '';
            status.innerText = "THINKING...";
            portal.classList.add('thinking');

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `User: ${query}. Respond only with a short paragraph analyzing this for a creative project.` }] }] })
                });
                const data = await res.json();
                const brainText = data.candidates[0].content.parts[0].text;
                
                document.getElementById('content').innerText = brainText;
                document.getElementById('p-label').innerText = "PROJECT ACTIVE";
                status.innerText = "SUCCESS";
            } catch (err) {
                status.innerText = "ERROR: " + err.message;
            } finally {
                portal.classList.remove('thinking');
            }
        }
    };
</script>
</body>
</html>
