<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENESISTUDIO | Command Canvas</title>
    <style>
        :root { --accent: #ffffff; --dim: #222222; --bg: #000000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        
        #viewport { width: 100vw; height: 100vh; overflow: hidden; position: relative; }
        #canvas { 
            position: absolute; width: 5000px; height: 5000px; 
            top: 0; left: 0; transform-origin: 0 0;
            transition: transform 0.1s ease-out;
        }

        /* Minimalist Portal */
        #brain-portal {
            position: absolute; top: 500px; left: 500px; transform: translate(-50%, -50%);
            width: 60px; height: 60px; border: 1px solid var(--dim); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; z-index: 5;
        }
        #portal-inner { width: 20px; height: 20px; border: 1px solid #444; border-radius: 50%; transition: 0.3s; }
        .thinking #portal-inner { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); animation: pulse 1s infinite; }

        /* The Main Project Container */
        #project-alpha {
            position: absolute; top: 400px; left: 600px;
            border: 1px solid var(--dim); background: rgba(5,5,5,0.9);
            padding: 20px; width: 350px; min-height: 100px;
            cursor: move; z-index: 10; transition: width 0.3s, height 0.3s, border 0.3s;
        }
        
        /* Zoom-out "Note" State */
        .zoomed-out #project-alpha { width: 180px; height: 40px; min-height: 40px; padding: 5px; border: 2px solid #444; overflow: hidden; }
        .zoomed-out .node-content, .zoomed-out .node-header { display: none; }
        .zoomed-out .project-label { display: block; font-size: 11px; text-align: center; color: var(--accent); padding-top: 10px; }
        
        .project-label { display: none; font-weight: bold; }
        .node-header { font-size: 9px; color: #666; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid #222; }
        .node-content { font-size: 14px; line-height: 1.5; color: #ddd; }

        /* UI Layer */
        #ui { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 600px; z-index: 1000; text-align: center; }
        #main-input { width: 100%; background: none; border: none; border-bottom: 1px solid var(--dim); color: #fff; padding: 10px; font-size: 16px; outline: none; text-align: center; }
        #status-msg { font-size: 9px; color: #444; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }

        @keyframes pulse { 0% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.3; transform: scale(0.8); } }
    </style>
</head>
<body>

<div id="viewport">
    <div id="canvas">
        <div id="brain-portal"><div id="portal-inner"></div></div>
        
        <div id="project-alpha">
            <div class="project-label" id="label-text">PROJECT: IDLE</div>
            <div class="node-header" id="node-type">Genesis Node</div>
            <div id="project-content" class="node-content">Drop an idea into the portal below...</div>
        </div>
    </div>
</div>

<div id="ui">
    <input type="text" id="main-input" placeholder="TALK TO THE BRAIN..." autocomplete="off">
    <div id="status-msg">Neural Link: Standby</div>
</div>

<script type="module">
    const API_KEY = localStorage.getItem('GENESIS_KEY');
    const canvas = document.getElementById('canvas');
    const portal = document.getElementById('brain-portal');
    const input = document.getElementById('main-input');
    const statusMsg = document.getElementById('status-msg');
    const projectBox = document.getElementById('project-alpha');
    
    let zoom = 1;

    // --- SPATIAL CONTROLS ---
    window.addEventListener('wheel', (e) => {
        e.preventDefault();
        zoom -= e.deltaY * 0.001;
        zoom = Math.min(Math.max(.2, zoom), 2);
        canvas.style.transform = `scale(${zoom})`;
        document.body.classList.toggle('zoomed-out', zoom < 0.6);
    }, { passive: false });

    // --- DRAG LOGIC ---
    let isDragging = false;
    let currentX, currentY, initialX, initialY;

    projectBox.addEventListener('mousedown', (e) => {
        initialX = e.clientX - projectBox.offsetLeft;
        initialY = e.clientY - projectBox.offsetTop;
        isDragging = true;
    });

    document.addEventListener('mousemove', (e) => {
        if (isDragging) {
            projectBox.style.left = (e.clientX - initialX) + 'px';
            projectBox.style.top = (e.clientY - initialY) + 'px';
        }
    });

    document.addEventListener('mouseup', () => isDragging = false);

    // --- BRAIN INTERACTION ---
    input.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && input.value) {
            const val = input.value;
            input.value = '';
            statusMsg.innerText = "Processing Idea...";
            portal.classList.add('thinking');
            await askBrain(val);
        }
    });

    async function askBrain(query) {
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `You are the AI Brain Mentor. The user says: "${query}". 
                    Respond with a JSON object: {"title": "Short Project Title", "content": "Analysis of the idea", "type": "Node Label"}. Keep it concise.` }] }]
                })
            });

            const data = await response.json();
            const textResponse = data.candidates[0].content.parts[0].text;
            
            // Clean the response in case AI adds markdown code blocks
            const cleanJson = textResponse.replace(/```json|```/g, '');
            const result = JSON.parse(cleanJson);

            document.getElementById('label-text').innerText = result.title.toUpperCase();
            document.getElementById('node-type').innerText = result.type;
            document.getElementById('project-content').innerHTML = result.content.replace(/\n/g, '<br>');
            
            statusMsg.innerText = "Neural Link: Active";
        } catch (err) {
            console.error(err);
            statusMsg.innerText = "Link Error: Check Console";
        } finally {
            portal.classList.remove('thinking');
        }
    }
</script>
</body>
</html>
