<!DOCTYPE html>
<html>
<head>
    <title>GENESISTUDIO | EMERGENCY RESET</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; padding: 50px; text-align: center; }
        #input-box { width: 80%; padding: 15px; background: #111; border: 1px solid #333; color: #fff; font-size: 1.2em; }
        #response { margin-top: 30px; border: 1px solid #444; padding: 20px; min-height: 100px; color: #0f0; }
        .error { color: #ff4444 !important; border-color: #ff4444 !important; }
    </style>
</head>
<body>

    <h1>GENESISTUDIO BOOTLOADER</h1>
    <p id="key-status">Checking Neural Link...</p>
    
    <input type="text" id="input-box" placeholder="TYPE SOMETHING AND PRESS ENTER..." autocomplete="off">
    
    <div id="response">Waiting for signal...</div>

    <script>
        // 1. FORCED KEY CHECK
        let key = localStorage.getItem('GENESIS_KEY');
        const status = document.getElementById('key-status');
        const respDiv = document.getElementById('response');

        if (!key) {
            key = prompt("NEURAL LINK ERROR: NO API KEY FOUND. PLEASE PASTE IT HERE:");
            if (key) localStorage.setItem('GENESIS_KEY', key.trim());
        }
        
        status.innerText = key ? "NEURAL LINK: KEY LOADED" : "NEURAL LINK: MISSING KEY";

        // 2. COMMUNICATION
        document.getElementById('input-box').onkeypress = async (e) => {
            if (e.key === 'Enter') {
                const val = e.target.value;
                e.target.value = '';
                respDiv.innerText = "SENSING...";
                respDiv.classList.remove('error');

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                    });

                    const data = await res.json();
                    
                    if (data.error) {
                        respDiv.innerHTML = "API ERROR: " + data.error.message;
                        respDiv.classList.add('error');
                    } else {
                        respDiv.innerText = data.candidates[0].content.parts[0].text;
                    }
                } catch (err) {
                    respDiv.innerText = "BROWSER ERROR: " + err.message;
                    respDiv.classList.add('error');
                }
            }
        };
    </script>
</body>
</html>
